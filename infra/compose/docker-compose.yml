services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      network: host
    env_file:
      - ../../apps/web/.env
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - /app/node_modules
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      api:
        condition: service_healthy
      realtime:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      network: host
    env_file:
      - ../../apps/api/.env
    ports:
      - "4000:4000"
    volumes:
      - ../../:/app
      - /app/node_modules
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  realtime:
    build:
      context: ../..
      dockerfile: apps/realtime/Dockerfile
      network: host
    env_file:
      - ../../apps/realtime/.env.example
    ports:
      - "2567:2567"
    volumes:
      - ../../:/app
      - /app/node_modules
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const s=require('net').connect(2567,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000)"
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: game_office
      POSTGRES_USER: game_office
      POSTGRES_PASSWORD: game_office
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_office -d game_office"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
